<!DOCTYPE html>
<html>
<head>
  <title>Sri Chaitanya Dental Care</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #2F80ED;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 15px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 6px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input, select {
      padding: 8px;
      margin: 5px 0;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      padding: 8px 12px;
      background: #2F80ED;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      margin-top: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    .dashboard {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .dash-box {
      flex: 1;
      min-width: 150px;
      background: white;
      padding: 15px;
      border-radius: 6px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .tooth-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 5px;
    }

    .tooth {
      padding: 10px;
      text-align: center;
      border: 1px solid #ccc;
      cursor: pointer;
      border-radius: 4px;
      font-size: 12px;
    }

    .planned { background: #4da6ff; color: white; }
    .completed { background: #4CAF50; color: white; }

  </style>
</head>

<body>

<header>🦷 Sri Chaitanya Dental Care</header>

<div class="container">

  <!-- Dashboard -->
  <div class="dashboard">
    <div class="dash-box">
      <h4>Total Patients</h4>
      <div id="totalPatients">0</div>
    </div>
    <div class="dash-box">
      <h4>Total Appointments</h4>
      <div id="totalAppointments">0</div>
    </div>
    <div class="dash-box">
      <h4>Total Revenue</h4>
      <div>₹ <span id="totalRevenue">0</span></div>
    </div>
  </div>

  <!-- Add Patient -->
  <div class="card">
    <h3>Add Patient</h3>
    <input type="text" id="pname" placeholder="Full Name">
    <input type="text" id="pphone" placeholder="Phone">
    <input type="number" id="page" placeholder="Age">
    <button onclick="addPatient()">Add Patient</button>
  </div>

  <!-- Book Appointment -->
  <div class="card">
    <h3>Book Appointment</h3>
    <select id="patientSelect"></select>
    <input type="datetime-local" id="apptTime">
    <input type="number" id="amount" placeholder="Consultation Fee">
    <button onclick="addAppointment()">Book Appointment</button>
  </div>

  <!-- Patients Table -->
  <div class="card">
    <h3>Patients</h3>
    <table id="patientTable">
      <tr><th>Name</th><th>Phone</th><th>Age</th></tr>
    </table>
  </div>

  <!-- Appointments Table -->
  <div class="card">
    <h3>Appointments</h3>
    <table id="appointmentTable">
      <tr><th>Patient</th><th>Date & Time</th><th>Amount</th></tr>
    </table>
  </div>

  <!-- Dental Chart -->
  <div class="card">
    <h3>Dental Chart (Click Tooth)</h3>
    <div class="tooth-grid" id="toothGrid"></div>
  </div>

</div>

<script>

let patients = JSON.parse(localStorage.getItem("patients")) || [];
let appointments = JSON.parse(localStorage.getItem("appointments")) || [];
let treatments = JSON.parse(localStorage.getItem("treatments")) || {};

const teeth = [18,17,16,15,14,13,12,11,21,22,23,24,25,26,27,28,
               48,47,46,45,44,43,42,41,31,32,33,34,35,36,37,38];

function saveData() {
  localStorage.setItem("patients", JSON.stringify(patients));
  localStorage.setItem("appointments", JSON.stringify(appointments));
  localStorage.setItem("treatments", JSON.stringify(treatments));
}

function updateDashboard() {
  document.getElementById("totalPatients").innerText = patients.length;
  document.getElementById("totalAppointments").innerText = appointments.length;

  let total = appointments.reduce((sum, a) => sum + Number(a.amount || 0), 0);
  document.getElementById("totalRevenue").innerText = total;
}

function renderPatients() {
  let table = document.getElementById("patientTable");
  let select = document.getElementById("patientSelect");

  table.innerHTML = "<tr><th>Name</th><th>Phone</th><th>Age</th></tr>";
  select.innerHTML = "";

  patients.forEach((p, index) => {
    table.innerHTML += `<tr><td>${p.name}</td><td>${p.phone}</td><td>${p.age}</td></tr>`;
    select.innerHTML += `<option value="${index}">${p.name}</option>`;
  });

  updateDashboard();
}

function renderAppointments() {
  let table = document.getElementById("appointmentTable");
  table.innerHTML = "<tr><th>Patient</th><th>Date & Time</th><th>Amount</th></tr>";

  appointments.forEach(a => {
    table.innerHTML += `<tr>
      <td>${a.patient}</td>
      <td>${new Date(a.date).toLocaleString()}</td>
      <td>₹ ${a.amount}</td>
    </tr>`;
  });

  updateDashboard();
}

function renderTeeth() {
  let grid = document.getElementById("toothGrid");
  grid.innerHTML = "";

  teeth.forEach(t => {
    let div = document.createElement("div");
    div.className = "tooth";
    div.innerText = t;

    if (treatments[t] === "planned") div.classList.add("planned");
    if (treatments[t] === "completed") div.classList.add("completed");

    div.onclick = function() {
      let status = prompt("Enter status: planned / completed");
      if (status === "planned" || status === "completed") {
        treatments[t] = status;
        saveData();
        renderTeeth();
      }
    };

    grid.appendChild(div);
  });
}

function addPatient() {
  let name = document.getElementById("pname").value;
  let phone = document.getElementById("pphone").value;
  let age = document.getElementById("page").value;

  if (!name || !phone) {
    alert("Enter name and phone");
    return;
  }

  patients.push({ name, phone, age });
  saveData();
  renderPatients();

  document.getElementById("pname").value = "";
  document.getElementById("pphone").value = "";
  document.getElementById("page").value = "";
}

function addAppointment() {
  let index = document.getElementById("patientSelect").value;
  let date = document.getElementById("apptTime").value;
  let amount = document.getElementById("amount").value;

  if (!date) {
    alert("Select date & time");
    return;
  }

  appointments.push({
    patient: patients[index].name,
    date: date,
    amount: amount
  });

  saveData();
  renderAppointments();
}

renderPatients();
renderAppointments();
renderTeeth();

</script>

</body>
</html>
