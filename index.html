<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sri Chaitanya Dental Care - Appointment</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
text-align:center;
}

.header{
background:#1565c0;
color:white;
padding:20px;
}

.container{
margin-top:40px;
}

input,select{
width:260px;
padding:10px;
margin:8px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:12px 25px;
background:#25D366;
border:none;
color:white;
font-size:16px;
cursor:pointer;
border-radius:5px;
margin-top:10px;
}

button:hover{
background:#20b858;
}

.calendar-btn{
background:#ff9800;
}

.footer{
margin-top:40px;
color:#777;
font-size:14px;
}

</style>
</head>

<body>

<div class="header">
<h2>🦷 Sri Chaitanya Dental Care</h2>
</div>

<div class="container">

<h3>Book Appointment</h3>

<select id="patientType">
<option value="New Patient">New Patient</option>
<option value="Existing Patient">Existing Patient</option>
</select>

<br>

<input id="name" placeholder="Patient Name">

<br>

<input id="phone" placeholder="Phone Number">

<br>

<input id="treatment" placeholder="Treatment">

<br>

<input type="datetime-local" id="time">

<br><br>

<button onclick="sendWhatsApp()">Send Appointment to Clinic</button>

<br>

<button class="calendar-btn" onclick="addCalendar()">Add to Google Calendar</button>

</div>

<div class="footer">
Online WhatsApp Appointment Booking
</div>

<script>

/* CHANGE THIS NUMBER TO YOUR CLINIC WHATSAPP */

let clinicNumber="91XXXXXXXXXX"


function getFormData(){

let type=document.getElementById("patientType").value
let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let treatment=document.getElementById("treatment").value
let time=document.getElementById("time").value

if(!name || !phone){

alert("Please enter patient name and phone number")

return null

}

let date=new Date(time).toLocaleString()

return {type,name,phone,treatment,time,date}

}


/* SEND MESSAGE TO CLINIC WHATSAPP */

function sendWhatsApp(){

let data=getFormData()

if(!data) return

let message=
`🦷 Sri Chaitanya Dental Care Appointment

Patient Type: ${data.type}

Patient Name: ${data.name}

Patient Phone: ${data.phone}

Treatment: ${data.treatment}

Preferred Time: ${data.date}`

let url=`https://wa.me/${clinicNumber}?text=${encodeURIComponent(message)}`

window.open(url)

}


/* ADD GOOGLE CALENDAR EVENT */

function addCalendar(){

let data=getFormData()

if(!data) return

let start=new Date(data.time)

let end=new Date(start.getTime()+30*60000)

function formatDate(d){

return d.toISOString().replace(/-|:|\.\d\d\d/g,"")

}

let url="https://calendar.google.com/calendar/render?action=TEMPLATE"

url+="&text=Dental Appointment - "+encodeURIComponent(data.name)

url+="&dates="+formatDate(start)+"/"+formatDate(end)

url+="&details="+encodeURIComponent("Treatment: "+data.treatment)

url+="&location=Sri Chaitanya Dental Care"

window.open(url)

}

</script>

</body>
</html>
