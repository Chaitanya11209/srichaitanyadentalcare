<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sri Chaitanya Dental Care</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
text-align:center;
}

.header{
background:#1565c0;
color:white;
padding:20px;
}

.container{
margin-top:30px;
}

input,select{
width:260px;
padding:10px;
margin:8px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:12px 25px;
border:none;
font-size:16px;
cursor:pointer;
border-radius:6px;
margin-top:10px;
}

.book{
background:#25D366;
color:white;
}

.call{
background:#2196F3;
color:white;
}

.map{
background:#ff5722;
color:white;
}

button:hover{
opacity:0.9;
}

.footer{
margin-top:40px;
color:#777;
font-size:14px;
}

</style>
</head>

<body>

<div class="header">
<h2>🦷 Sri Chaitanya Dental Care</h2>
<p>Quick Appointment Booking</p>
</div>

<div class="container">

<h3>Book Appointment</h3>

<select id="patientType">
<option value="New Patient">New Patient</option>
<option value="Existing Patient">Existing Patient</option>
</select>

<br>

<input id="name" placeholder="Patient Name">

<br>

<input id="phone" placeholder="Patient Phone">

<br>

<input id="treatment" placeholder="Treatment (Cleaning, RCT, etc)">

<br>

<input type="datetime-local" id="time">

<br><br>

<button class="book" onclick="bookAppointment()">Book Appointment</button>

<br>

<button class="call" onclick="callClinic()">📞 Call Clinic</button>

<br>

<button class="map" onclick="openMap()">📍 View Clinic Location</button>

</div>

<div class="footer">
Online WhatsApp Appointment Booking
</div>

<script>

/* CHANGE THESE NUMBERS */

let doctorNumber="91XXXXXXXXXX"
let clinicNumber="91XXXXXXXXXX"

/* CHANGE MAP LINK */

let clinicMap="https://maps.google.com/?q=Sri+Chaitanya+Dental+Care"


function bookAppointment(){

let type=document.getElementById("patientType").value
let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let treatment=document.getElementById("treatment").value
let time=document.getElementById("time").value

if(!name || !phone || !treatment || !time){

alert("Please fill all details")

return

}

let date=new Date(time).toLocaleString()

let message=
`🦷 Sri Chaitanya Dental Care Appointment

Patient Type: ${type}

Patient Name: ${name}

Patient Phone: ${phone}

Treatment: ${treatment}

Preferred Time: ${date}`

let doctorURL=`https://wa.me/${doctorNumber}?text=${encodeURIComponent(message)}`
let clinicURL=`https://wa.me/${clinicNumber}?text=${encodeURIComponent(message)}`

window.open(doctorURL)

setTimeout(function(){

window.open(clinicURL)

},1500)

}

function callClinic(){

window.location.href="tel:+91XXXXXXXXXX"

}

function openMap(){

window.open(clinicMap)

}

</script>

</body>
</html>
