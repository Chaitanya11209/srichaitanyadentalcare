<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sri Chaitanya Dental Care</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
text-align:center;
}

.header{
background:#1565c0;
color:white;
padding:20px;
}

.container{
margin-top:40px;
}

input,select{
width:260px;
padding:10px;
margin:8px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:12px 25px;
background:#25D366;
border:none;
color:white;
font-size:16px;
cursor:pointer;
border-radius:5px;
margin-top:10px;
}

button:hover{
background:#20b858;
}

.map-btn{
background:#ff5722;
}

.footer{
margin-top:40px;
color:#777;
font-size:14px;
}

</style>
</head>

<body>

<div class="header">
<h2>🦷 Sri Chaitanya Dental Care</h2>
</div>

<div class="container">

<h3>Book Appointment</h3>

<select id="patientType">
<option value="New Patient">New Patient</option>
<option value="Existing Patient">Existing Patient</option>
</select>

<br>

<input id="name" placeholder="Patient Name">

<br>

<input id="phone" placeholder="Patient Phone">

<br>

<input id="treatment" placeholder="Treatment">

<br>

<input type="datetime-local" id="time">

<br><br>

<button onclick="sendWhatsApp()">Book Appointment</button>

<br>

<button class="map-btn" onclick="openMap()">📍 View Clinic Location</button>

</div>

<div class="footer">
Online WhatsApp Appointment Booking
</div>

<script>

/* CHANGE THESE NUMBERS */

let doctorNumber="918277090710"
let clinicNumber="918317575165"

/* GOOGLE MAP LINK */

let clinicMap="https://maps.app.goo.gl/qYiuSzNoLLMZX5Wy8"


function getFormData(){

let type=document.getElementById("patientType").value
let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let treatment=document.getElementById("treatment").value
let time=document.getElementById("time").value

if(!name || !phone){

alert("Please enter patient name and phone")

return null

}

let date=new Date(time).toLocaleString()

return {type,name,phone,treatment,time,date}

}

/* WHATSAPP MESSAGE */

function sendWhatsApp(){

let data=getFormData()

if(!data) return

let message=
`🦷 Sri Chaitanya Dental Care Appointment

Patient Type: ${data.type}

Patient Name: ${data.name}

Patient Phone: ${data.phone}

Treatment: ${data.treatment}

Preferred Time: ${data.date}`

let doctorURL=`https://wa.me/${doctorNumber}?text=${encodeURIComponent(message)}`
let clinicURL=`https://wa.me/${clinicNumber}?text=${encodeURIComponent(message)}`

window.open(doctorURL)

setTimeout(function(){

window.open(clinicURL)

},1500)

}

/* OPEN GOOGLE MAP */

function openMap(){

window.open(clinicMap)

}

</script>

</body>
</html>
