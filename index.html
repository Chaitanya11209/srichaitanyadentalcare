<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Dental Clinic Management System</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Dental Clinic Management System</h1>
        <button id="darkModeToggle">Toggle Dark Mode</button>
    </header>
    <main>
        <section id="patientManagement">
            <h2>Patient Management</h2>
            <input type="text" id="searchPatient" placeholder="Search Patient..." />
            <ul id="patientList"></ul>
            <button id="addPatient">Add Patient</button>
        </section>
        <section id="appointmentBooking">
            <h2>Appointment Booking</h2>
            <form id="appointmentForm">
                <input type="date" id="appointmentDate" required />
                <input type="time" id="appointmentTime" required />
                <select id="doctorAssignment">
                    <option value="doctor1">Doctor 1</option>
                    <option value="doctor2">Doctor 2</option>
                </select>
                <button type="submit">Book Appointment</button>
            </form>
        </section>
        <section id="analytics">
            <h2>Analytics and Reports</h2>
            <button id="generateReport">Generate Report</button>
            <div id="reportOutput"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Dental Clinic</p>
    </footer>
</body>
</html>
