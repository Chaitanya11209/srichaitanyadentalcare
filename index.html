<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sri Chaitanya Dental Care</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
text-align:center;
}

/* HEADER */

.header{
background:#1565c0;
color:white;
padding:20px;
}

/* MAIN BUTTON */

.book-btn{
margin-top:40px;
padding:15px 30px;
font-size:18px;
background:#4caf50;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* POPUP BACKGROUND */

.popup-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

/* POPUP BOX */

.popup{
background:white;
padding:20px;
border-radius:10px;
width:320px;
text-align:left;
}

.popup h3{
margin-top:0;
}

/* INPUTS */

.popup input,
.popup select{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

/* BUTTONS */

.popup button{
padding:10px;
border:none;
cursor:pointer;
margin-top:10px;
border-radius:5px;
}

.send{
background:#25D366;
color:white;
width:100%;
}

.cancel{
background:#ccc;
width:100%;
}

/* MOBILE */

@media(max-width:600px){

.popup{
width:90%;
}

}

</style>
</head>

<body>

<div class="header">
<h2>🦷 Sri Chaitanya Dental Care</h2>
</div>

<h3>Online Appointment Booking</h3>

<button class="book-btn" onclick="openPopup()">Book Appointment</button>

<!-- POPUP -->

<div id="popupBg" class="popup-bg">

<div class="popup">

<h3>Book Appointment</h3>

<select id="patientType">
<option value="New Patient">New Patient</option>
<option value="Existing Patient">Existing Patient</option>
</select>

<input id="name" placeholder="Patient Name">

<input id="phone" placeholder="Phone Number">

<input id="treatment" placeholder="Treatment">

<input type="datetime-local" id="time">

<button class="send" onclick="sendWhatsApp()">Send via WhatsApp</button>

<button class="cancel" onclick="closePopup()">Cancel</button>

</div>

</div>

<script>

/* OPEN POPUP */

function openPopup(){

document.getElementById("popupBg").style.display="flex"

}

/* CLOSE POPUP */

function closePopup(){

document.getElementById("popupBg").style.display="none"

}

/* SEND WHATSAPP MESSAGE */

function sendWhatsApp(){

let type=document.getElementById("patientType").value
let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let treatment=document.getElementById("treatment").value
let time=document.getElementById("time").value

if(!name || !phone){

alert("Please enter patient name and phone number")

return

}

let date=new Date(time).toLocaleString()

let message=
`🦷 Sri Chaitanya Dental Care

Patient Type: ${type}

Patient Name: ${name}

Treatment: ${treatment}

Appointment Time: ${date}

Please confirm your visit.`

let url=`https://wa.me/91${phone}?text=${encodeURIComponent(message)}`

window.open(url,"_blank")

closePopup()

}

</script>

</body>
</html>
