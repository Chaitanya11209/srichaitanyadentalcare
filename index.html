<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sri Chaitanya Multispeciality Dental Care</title>

<style>

body{font-family:Arial;background:#f4f6f9;text-align:center;margin:0}

.header{background:#1565c0;color:white;padding:20px}

input,select{
width:260px;
padding:10px;
margin:8px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
margin:2px;
}

.book{background:#25D366;color:white}
.call{background:#2196F3;color:white}
.map{background:#ff5722;color:white}

.dashboard{
margin-top:40px;
background:white;
padding:20px;
max-width:600px;
margin-left:auto;
margin-right:auto;
border-radius:8px;
}

ul{list-style:none;padding:0}

li{border-bottom:1px solid #eee;padding:10px;text-align:left}

.slot{font-weight:bold}

.phone{font-size:13px;color:#555}

.actions{margin-top:5px}

.cancel{background:#e53935;color:white}
.reminder{background:#4caf50;color:white}
.callbtn{background:#2196F3;color:white}

</style>

</head>

<body>

<div class="header">
<h2>🦷 Sri Chaitanya Multispeciality Dental Care 🦷</h2>
<p>Appointment Booking</p>
</div>


<label>Select Appointment Date</label><br>
<input type="date" id="date"><br>


<select id="patientType">
<option>New Patient</option>
<option>Existing Patient</option>
</select><br>


<input id="name" placeholder="Patient Name"><br>

<input id="phone" placeholder="Phone Number" onkeyup="searchPatient()"><br>

<div id="historyPreview" style="font-size:12px;color:#777"></div>


<select id="treatment">
<option>Select Treatment</option>
<option>Dental Cleaning</option>
<option>Root Canal Treatment</option>
<option>Dental Filling</option>
<option>Extraction</option>
<option>Checkup</option>
</select><br>


<select id="slot">
<option>Select Slot</option>
</select><br>


<button class="book" onclick="book()">Book Appointment</button><br>

<button class="call" onclick="callClinic()">📞 Call Clinic</button><br>

<button class="map" onclick="openMap()">📍 Location</button>


<div class="dashboard">

<h3 id="dashboardTitle">Appointments</h3>

<ul id="appointments"></ul>

</div>


<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>


<script>

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyDeV4_XRKzhR1IFW5jo21aK87EZmKh4bCY",

authDomain: "dentalbooking-66754.firebaseapp.com",

databaseURL: "https://dentalbooking-66754-default-rtdb.firebaseio.com",

projectId: "dentalbooking-66754",

storageBucket: "dentalbooking-66754.firebasestorage.app",

messagingSenderId: "668789005424",

appId: "1:668789005424:web:59440a98f73271afd428b5"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()


let doctorNumber="919346319812"
let clinicNumber="918317575165"

let clinicMap="https://maps.google.com/?q=Sri+Chaitanya+Dental+Care"



/* DEFAULT DATE */

let today=new Date().toISOString().split("T")[0]
document.getElementById("date").value=today



/* GENERATE TIME SLOTS */

let slot=document.getElementById("slot")

for(let h=10;h<=21;h++){

for(let m=0;m<60;m+=30){

let hour=h
let minute=m.toString().padStart(2,"0")

let ampm=hour>=12?"PM":"AM"
let display=hour>12?hour-12:hour
if(display==0)display=12

let time=`${display}:${minute} ${ampm}`

let opt=document.createElement("option")
opt.text=time
opt.value=time

slot.appendChild(opt)

}

}



/* SEARCH PATIENT HISTORY */

function searchPatient(){

let phone=document.getElementById("phone").value

db.ref("appointments").once("value",snapshot=>{

let data=snapshot.val()

if(!data)return

let history=[]

for(let d in data){

for(let k in data[d]){

if(data[d][k].phone===phone){

document.getElementById("name").value=data[d][k].name
history.push(data[d][k].treatment)

}

}

}

if(history.length>0){

document.getElementById("historyPreview").innerText="History: "+history.join(", ")

}else{

document.getElementById("historyPreview").innerText=""

}

})

}



/* LOAD APPOINTMENTS */

function loadAppointments(){

let date=document.getElementById("date").value

document.getElementById("dashboardTitle").innerText="Appointments for "+date

db.ref("appointments/"+date).on("value",snapshot=>{

let data=snapshot.val()

let list=document.getElementById("appointments")

list.innerHTML=""

if(!data)return

let options=slot.options

for(let i=0;i<options.length;i++)options[i].disabled=false


for(let key in data){

let ap=data[key]

for(let i=0;i<options.length;i++){

if(options[i].value===ap.slot)options[i].disabled=true

}


let li=document.createElement("li")

let slotText=document.createElement("div")
slotText.className="slot"
slotText.innerText=`${ap.slot} - ${ap.name} (${ap.treatment})`

let phoneText=document.createElement("div")
phoneText.className="phone"
phoneText.innerText=`📞 ${ap.phone}`


let actions=document.createElement("div")
actions.className="actions"


let call=document.createElement("button")
call.innerText="Call"
call.className="callbtn"
call.onclick=()=>window.location.href="tel:+91"+ap.phone


let remind=document.createElement("button")
remind.innerText="Reminder"
remind.className="reminder"

remind.onclick=function(){

let msg=`Reminder from Sri Chaitanya Multispeciality Dental Care

Hello ${ap.name}

Your appointment is at ${ap.slot}

${clinicMap}`

window.open(`https://wa.me/91${ap.phone}?text=${encodeURIComponent(msg)}`)

}


let cancel=document.createElement("button")
cancel.innerText="Cancel"
cancel.className="cancel"
cancel.onclick=()=>db.ref("appointments/"+date+"/"+key).remove()


actions.appendChild(call)
actions.appendChild(remind)
actions.appendChild(cancel)


li.appendChild(slotText)
li.appendChild(phoneText)
li.appendChild(actions)

list.appendChild(li)

}

})

}

loadAppointments()

document.getElementById("date").addEventListener("change",loadAppointments)



/* BOOK APPOINTMENT */

function book(){

let date=document.getElementById("date").value

let patientType=document.getElementById("patientType").value
let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let treatment=document.getElementById("treatment").value
let slot=document.getElementById("slot").value

if(!name||!phone||!treatment||!slot){

alert("Fill all details")
return

}


/* APPOINTMENT ID */

let timeCode=slot.replace(/[^0-9]/g,"")
let dateCode=date.replaceAll("-","")

let appointmentId="SC-"+dateCode+"-"+timeCode


let slotKey=slot.replace(/[^a-zA-Z0-9]/g,"")


db.ref("appointments/"+date+"/"+slotKey).once("value",snapshot=>{

if(snapshot.exists()){

alert("Slot already booked")

return

}


db.ref("appointments/"+date+"/"+slotKey).set({

appointmentId,
patientType,
name,
phone,
treatment,
slot

})


let msg=`*Sri Chaitanya Multispecaility Dental Care*

*Appointment Confirmed*

Appointment ID: ${appointmentId}

Patient: ${name}
Phone: ${phone}
${patientType}

Treatment: ${treatment}
Time: ${slot}
Date: ${date}

Location
${clinicMap}`


/* SEND TO DOCTOR */

window.open(`https://wa.me/${doctorNumber}?text=${encodeURIComponent(msg)}`)

/* SEND TO CLINIC */

setTimeout(()=>{
window.open(`https://wa.me/${clinicNumber}?text=${encodeURIComponent(msg)}`)
},1500)

/* SEND TO PATIENT */

setTimeout(()=>{
window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`)
},3000)

})

}



function callClinic(){

window.location.href="tel:+918317575165"

}


function openMap(){

window.open(clinicMap)

}

</script>

</body>
</html>
